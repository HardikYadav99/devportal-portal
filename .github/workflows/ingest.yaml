name: Ingest User Repository

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: "GitHub repository URL"
        required: true
        type: string

jobs:
  ingest-repository:
    runs-on: ubuntu-latest
    steps:
      - name: Clone user repository
        run: |
          git clone ${{ inputs.repo_url }} user-app

      - name: Clone devportal-gitops repository
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/HardikYadav99/devportal-gitops.git

      - name: Remove old source-app contents
        run: |
          rm -rf devportal-gitops/source-app/*
          rm -rf devportal-gitops/source-app/.[!.]*

      - name: Copy new app into source-app
        run: |
          rm -rf user-app/.git
          cp -r user-app/. devportal-gitops/source-app/

      - name: Commit and push updated source-app
        run: |
          cd devportal-gitops
          
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          git commit -m "Automated source-app update" || echo "No changes to commit"

          git push

