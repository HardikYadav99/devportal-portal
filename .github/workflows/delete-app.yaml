name: Delete Application Pipeline 

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Application Name"
        required: true
        type: string
permissions:
  contents: write

jobs:
  delete-application:
    runs-on: ubuntu-latest

    steps:
      - name: Cloning GitOps Repository
        run: |
          git clone "https://x-access-token:${{ secrets.GH_PAT }}@github.com/HardikYadav99/devportal-gitops.git"

      - name: Delete ArgoCD application 
        run: |

          rm -f \
            devportal-gitops/argocd-apps/${{ inputs.app_name }}-app.yaml

      - name: Commit ArgoCd Application deletion 
        run: |
          cd devportal-gitops

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit \
            -m "Deleted ArgoCd ${{ inputs.app_name }}-app.yaml" || true
          git push
          
      - name: Wait for ArgoCd Prune
        run: |
          echo "Waiting for ArgoCd to delete and clean up resources clean up"
          sleep 180

      - name: Delete Source Application 
        run: |
          rm -rf \
            devportal-gitops/source-app/${{ inputs.app_name }}

      - name: Verfication of Remaning Files
        run: |
          echo ""
          echo "Remaining Apps In Source App"
          ls -la devportal-gitops/argocd-apps

          echo "Remaing ArgoCD Templates"
          ls -la devportal-gitops/source-app
      
      - name: Commit Changes
        run: |

          cd devportal-gitops

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit \
            -m "Deleted ${{ inputs.app_name }}" || true
          git push 



