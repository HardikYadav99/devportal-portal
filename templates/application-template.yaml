apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: APP_NAME
  namespace: argocd

spec:
  project: default

  source:
  repourl: https://github.com/HardikYadav99/devportal-gitops
  targetRevision: main
  path: workload

  helm:
    valueFiles:
      - ../source-app/APP_NAME/values.yaml

destination:
  server: https://kubernetes.default.svc
  namespace: default

syncPolicy:
  automate:
    prune: true
    selfHeal: true

  syncOptions:
    - CreateNamespace=true